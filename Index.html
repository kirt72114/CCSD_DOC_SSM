<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>DOC SSM Dashboard</title>

<body>

<!-- ============================================================
    DOC SSM SINGLE-PAGE DASHBOARD (Outline + TODO Script Sections)
    PART 1 OF 4: HTML + CSS + SCRIPT SKELETON (NO DATA LOGIC YET)
    - This is safe to paste as-is into Modern Script Editor
    - Next messages will contain the 3 script sections to replace the TODO blocks:
      (2/4) FOIAs section
      (3/4) OIs section
      (4/4) Records section
    ============================================================ -->

<div id="docSsmDashRoot"></div>

<style>
 /* ====== Layout + Theme ====== */
 #docSsmDashRoot .docdash{font-family:Segoe UI, Arial, sans-serif;color:#0b1b2b;}
 #docSsmDashRoot .docdash-topbar{
   display:flex;align-items:center;justify-content:space-between;gap:12px;
   padding:12px 14px;border-radius:12px;
   background:linear-gradient(90deg,#0b4e88,#0a76c6);color:#fff;
   box-shadow:0 8px 20px rgba(0,0,0,.18);
 }
 #docSsmDashRoot .docdash-brand .u-tag{display:inline-block;font-weight:800;margin-right:8px;opacity:.95;}
 #docSsmDashRoot .docdash-brand .title{font-size:18px;font-weight:800;letter-spacing:.3px;}
 #docSsmDashRoot .docdash-brand .subtitle{margin-left:10px;font-size:12px;opacity:.92;}
 #docSsmDashRoot .docdash-tabs{display:flex;gap:8px;flex-wrap:wrap;}
 #docSsmDashRoot .tabbtn{
   border:1px solid rgba(255,255,255,.35);
   background:rgba(255,255,255,.08);
   color:#fff;padding:8px 10px;border-radius:999px;cursor:pointer;
   font-weight:700;font-size:13px;
 }
 #docSsmDashRoot .tabbtn.active{background:#fff;color:#0b4e88;border-color:#fff;}
 #docSsmDashRoot .docdash-tools{display:flex;align-items:center;gap:10px;}
 #docSsmDashRoot .btn{border:none;border-radius:10px;padding:8px 10px;cursor:pointer;font-weight:800;}
 #docSsmDashRoot .btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);}
 #docSsmDashRoot .btn-ghost:hover{background:rgba(255,255,255,.22);}
 #docSsmDashRoot .statuspill{
   padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.18);
   border:1px solid rgba(255,255,255,.25);font-size:12px;white-space:nowrap;
 }
 #docSsmDashRoot .spinner{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-right:6px;vertical-align:-2px;}
 @keyframes spin{to{transform:rotate(360deg);}}

 #docSsmDashRoot .docdash-body{display:grid;grid-template-columns:360px 1fr;gap:14px;margin-top:12px;}
 @media(max-width:1100px){#docSsmDashRoot .docdash-body{grid-template-columns:1fr;}}
 #docSsmDashRoot .panel{background:#fff;border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,.10);border:1px solid #e6eef6;overflow:hidden;}
 #docSsmDashRoot .panel-h{padding:10px 12px;background:linear-gradient(90deg,#0a76c6,#0b4e88);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:space-between;}
 #docSsmDashRoot .panel-b{padding:10px 12px;}

 #docSsmDashRoot .kpiRow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
 #docSsmDashRoot .kpi{padding:10px;border-radius:12px;background:#f6fbff;border:1px solid #e2effa;}
 #docSsmDashRoot .kpi .k{font-size:11px;opacity:.85;font-weight:800;letter-spacing:.3px;}
 #docSsmDashRoot .kpi .v{font-size:20px;font-weight:900;margin-top:2px;}
 #docSsmDashRoot .kpi .s{font-size:11px;opacity:.75;margin-top:2px;}

 #docSsmDashRoot .filterGrid{display:grid;grid-template-columns:1fr;gap:10px;}
 #docSsmDashRoot .frow label{display:block;font-weight:800;font-size:12px;margin-bottom:4px;}
 #docSsmDashRoot .frow input[type=text],#docSsmDashRoot .frow select{width:100%;border:1px solid #d6e4f1;border-radius:10px;padding:8px 10px;outline:none;background:#fff;}
 #docSsmDashRoot .chipbox{display:flex;flex-wrap:wrap;gap:6px;}
 #docSsmDashRoot .chip{border:1px solid #d6e4f1;background:#fff;border-radius:999px;padding:6px 8px;font-size:12px;cursor:pointer;font-weight:700;}
 #docSsmDashRoot .chip.on{background:#0a76c6;border-color:#0a76c6;color:#fff;}
 #docSsmDashRoot .muted{opacity:.75;font-size:12px;}

 #docSsmDashRoot .chartWrap{display:grid;grid-template-columns:1fr;gap:10px;}
 #docSsmDashRoot .chart{padding:10px;border:1px solid #e6eef6;border-radius:12px;background:#fbfdff;}
 #docSsmDashRoot .chartTitle{font-weight:900;font-size:12px;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;}
 #docSsmDashRoot .chartTitle .hint{font-weight:700;font-size:11px;opacity:.7;}

 #docSsmDashRoot .tableWrap{display:grid;grid-template-columns:1fr 360px;gap:14px;}
 @media(max-width:1300px){#docSsmDashRoot .tableWrap{grid-template-columns:1fr;}}
 #docSsmDashRoot .tableStack{display:flex;flex-direction:column;gap:14px;}
 #docSsmDashRoot .tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;}
 #docSsmDashRoot .tbl th{position:sticky;top:0;background:#f2f7fd;border-bottom:1px solid #dbe8f6;text-align:left;padding:8px;font-weight:900;cursor:pointer;}
 #docSsmDashRoot .tbl td{border-bottom:1px solid #eef4fb;padding:8px;vertical-align:top;}
 #docSsmDashRoot .tbl tr:hover td{background:#fbfdff;}
 #docSsmDashRoot .tbl tbody tr.rowSel td{background:#eaf4ff;}
 #docSsmDashRoot .badge{display:inline-block;padding:3px 8px;border-radius:999px;font-weight:900;font-size:11px;border:1px solid #d6e4f1;background:#fff;}
 #docSsmDashRoot .badge.good{background:#eafff0;border-color:#b7f2c8;}
 #docSsmDashRoot .badge.warn{background:#fff7e6;border-color:#ffe2a8;}
 #docSsmDashRoot .badge.bad{background:#ffecec;border-color:#ffc2c2;}
 #docSsmDashRoot .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;padding:10px 12px;}
 #docSsmDashRoot .pager .pbtn{border:1px solid #d6e4f1;background:#fff;border-radius:10px;padding:6px 10px;cursor:pointer;font-weight:900;}
 #docSsmDashRoot .pager .pbtn:disabled{opacity:.5;cursor:not-allowed;}

 #docSsmDashRoot .detail{display:flex;flex-direction:column;gap:10px;}
 #docSsmDashRoot .detail .box{border:1px solid #e6eef6;border-radius:12px;padding:10px;background:#fbfdff;}
 #docSsmDashRoot .detail .box > .k{font-weight:900;font-size:13px;letter-spacing:.3px;color:#0b4e88;margin-bottom:8px;text-transform:uppercase;}
 #docSsmDashRoot .detail .box .box{border:none;background:transparent;padding:0;margin-top:2px;}
 #docSsmDashRoot .detail h3{margin:0;font-size:14px;}
 #docSsmDashRoot .detail .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;}
 #docSsmDashRoot .detail .meta .kv{background:#fff;border:1px solid #e6eef6;border-radius:10px;padding:8px;}
 #docSsmDashRoot .detail .meta .k{font-weight:900;font-size:11px;opacity:.75;text-transform:none;color:inherit;margin-bottom:0;}
 #docSsmDashRoot .detail .meta .v{margin-top:2px;font-weight:800;word-break:break-word;}
 #docSsmDashRoot .detail pre{white-space:pre-wrap;margin:0;font-family:inherit;font-size:12px;}
 #docSsmDashRoot .detail .actions{display:flex;gap:8px;flex-wrap:wrap;}
 #docSsmDashRoot .detail .actions .btn2{border:1px solid #d6e4f1;background:#fff;border-radius:10px;padding:7px 10px;cursor:pointer;font-weight:900;font-size:12px;}
 #docSsmDashRoot .detail .actions .btn2.primary{background:#0a76c6;border-color:#0a76c6;color:#fff;}
 #docSsmDashRoot .footnote{font-size:11px;opacity:.75;line-height:1.35;}



</style>

<script>
(function(){
 "use strict";

 /* ============================================================
    DOC SSM — Single Page Dashboard (Skeleton)
    - This file is intentionally missing the 3 module implementations.
    - You will paste each module section in the next 3 parts.
    ============================================================ */

/* ===================== GLOBAL ERROR SURFACE (PASTE RIGHT AFTER "use strict") ===================== */
function _fatal(label, err){
  try{
    var msg = label + ": " + (err && err.message ? err.message : String(err));

    // Try to show it in the pill if it exists
    try{
      if(typeof statusPill !== "undefined" && statusPill){
        statusPill.textContent = msg;
      }
    }catch(e1){}

    // Also print to console
    try{ console.error(label, err); }catch(e2){}

    // Inject a visible red box at the top of the web part
    try{
      var r = document.getElementById("docSsmDashRoot");
      if(r){
        var box = document.createElement("div");
        box.style.padding = "10px 12px";
        box.style.margin = "10px 0";
        box.style.border = "1px solid #ffb3b3";
        box.style.background = "#ffecec";
        box.style.borderRadius = "12px";
        box.style.fontFamily = "Segoe UI, Arial, sans-serif";
        box.style.fontWeight = "700";
        box.textContent = msg;

        // Put it at the very top of the web part
        r.insertBefore(box, r.firstChild);
      }
    }catch(e3){}
  }catch(e4){}
}

 /* ===================== CONFIG ===================== */
 var CONFIG = {
   SITE_URL: "",

   LISTS: {
     // From DOC SSM Lists and Columns 2.txt
     FOIA:  "BA57799F-5F18-4DF1-9501-6E306E264241",
     TIME:  "622a3d54-5d1f-407d-8c6d-de85de9f5aa4",
     POC:   "26c963fc-98b2-4360-baa3-386572290fd8",
     RM:    "58e2105d-cb34-44a4-890a-715f6c3fa287",
     RI:    "b0631573-5269-4a26-86eb-417014367ded",
     OI:    "ff3dd122-3d04-4a6c-8f2e-bc31fd242967"
   },

   /** Max rows per SharePoint $top page request. */
   TOP: 5000,
   /** Rows rendered per page in every data table. */
   TABLE_PAGE_SIZE: 25,

   /** CurrentStatus value that marks a FOIA case as closed. */
   FOIA_CLOSED_STATUS: "Case Closed",

   /** Days since last modification before a FOIA row flags yellow (warn). */
   INACTIVITY_WARN: 14,
   /** Days since last modification before a FOIA row flags red (bad). */
   INACTIVITY_BAD:  30
 };

/* ===================== CONFIG ADD (place near your FOIA constants) ===================== */ 
CONFIG.FOIA_CLOSED_STATUS = "Case Closed"; CONFIG.FOIA_TRANSFERRED_STATUS = "Transferred";

 // Auto-detect site URL if blank
 if(!CONFIG.SITE_URL){
   var origin = window.location.origin;
   var path = window.location.pathname;

   var idx = path.toLowerCase().indexOf("/lists/");
   if(idx > -1){ path = path.substring(0, idx); }

   var spIdx = path.toLowerCase().indexOf("/sitepages/");
   if(spIdx > -1){ path = path.substring(0, spIdx); }

   CONFIG.SITE_URL = origin + path.replace(/\/$/, "");
 }

 /* ===================== DOM HELPERS ===================== */
 function el(tag, cls, txt){
   var e = document.createElement(tag);
   if(cls) e.className = cls;
   if(txt !== undefined && txt !== null) e.textContent = txt;
   return e;
 }
 function empty(node){ while(node.firstChild) node.removeChild(node.firstChild); }
 function on(node, evt, fn){ node.addEventListener(evt, fn); }
 function esc(s){
   if(s === null || s === undefined) return "";
   return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
 }
 function fmtDate(d){
   if(!d) return "";
   var dt = new Date(d);
   if(isNaN(dt.getTime())) return "";
   var m = String(dt.getMonth()+1); if(m.length===1) m="0"+m;
   var day = String(dt.getDate()); if(day.length===1) day="0"+day;
   return dt.getFullYear()+"-"+m+"-"+day;
 }
 function fmtDateTime(d){
   if(!d) return "";
   var dt = new Date(d);
   if(isNaN(dt.getTime())) return "";
   var h = dt.getHours(); var ap = h>=12?"PM":"AM"; h = h%12; if(h===0) h=12;
   var min = String(dt.getMinutes()); if(min.length===1) min="0"+min;
   return fmtDate(d)+" "+h+":"+min+" "+ap;
 }
 function toNum(v){ var n = Number(v); return isNaN(n) ? 0 : n; }
 function yearOf(d){
   if(!d) return "";
   var dt = new Date(d);
   if(isNaN(dt.getTime())) return "";
   return String(dt.getFullYear());
 }

 /* ===================== SHAREPOINT REST HELPERS ===================== */
 function spGet(url){
  return fetch(url, {
    headers: { "Accept":"application/json;odata=nometadata" },
    credentials: "same-origin"
  }).then(function(r){
    if(!r.ok){
      return r.text().then(function(t){
        var msg = "HTTP " + r.status + " " + r.statusText + "\nURL: " + url + "\nBODY: " + t;
        throw new Error(msg);
      });
    }
    return r.json();
  });
}


 function spGetAll(listGuid, select, expand, filter, orderby, top){
   var base = CONFIG.SITE_URL + "/_api/web/lists(guid'"+listGuid+"')/items";
   var qs = [];
   if(select) qs.push("$select="+encodeURIComponent(select));
   if(expand) qs.push("$expand="+encodeURIComponent(expand));
   if(filter) qs.push("$filter="+encodeURIComponent(filter));
   if(orderby) qs.push("$orderby="+encodeURIComponent(orderby));
   qs.push("$top="+encodeURIComponent(top || CONFIG.TOP));

   var url = base + "?" + qs.join("&");
   var all = [];

   function loop(u){
     return spGet(u).then(function(data){
       if(data && data.value) all = all.concat(data.value);
       if(data && data["odata.nextLink"]) return loop(data["odata.nextLink"]);
       if(data && data["@odata.nextLink"]) return loop(data["@odata.nextLink"]);
       return all;
     });
   }
   return loop(url);
 }

 function spOpenItem(listGuid, itemId){
   var u = CONFIG.SITE_URL + "/_layouts/15/listform.aspx?PageType=4&ListId="+encodeURIComponent(listGuid)+"&ID="+encodeURIComponent(itemId);
   var w = window.open(u, "_blank");
   if(w) w.opener = null;
 }

function spGetFieldMap(listGuid){
  var url = CONFIG.SITE_URL +
    "/_api/web/lists(guid'" + listGuid + "')/fields" +
    "?$select=Title,InternalName&$top=5000";
  return spGet(url).then(function(data){
    var map = {};
    var i, f, title;
    if(data && data.value){
      for(i=0;i<data.value.length;i++){
        f = data.value[i];
        title = (f.Title || "").trim();
        if(title) map[title] = f.InternalName;
      }
    }
    return map;
  });
}


 /* ===================== SVG BAR CHART (click-to-filter) ===================== */
 function renderBarChart(container, title, dataPairs, activeValue, onClick){
   empty(container);

   var wrap = el("div","chart");
   var t = el("div","chartTitle");
   t.appendChild(el("div",null,title));
   t.appendChild(el("div","hint","click bars to filter"));
   wrap.appendChild(t);

   var w = 320, h = 140, pad = 24;
   var svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
   svg.setAttribute("viewBox","0 0 "+w+" "+h);
   svg.style.width="100%";
   svg.style.height="140px";

   var max = 0, i;
   for(i=0;i<dataPairs.length;i++){ if(dataPairs[i].value>max) max=dataPairs[i].value; }
   if(max===0) max=1;

   var barW = (w - pad*2) / Math.max(1,dataPairs.length);

   for(i=0;i<dataPairs.length;i++){
     var p = dataPairs[i];
     var x = pad + i*barW + 6;
     var bw = Math.max(10, barW-12);
     var bh = Math.round((h - pad*2) * (p.value/max));
     var y = (h - pad) - bh;

     var rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
     rect.setAttribute("x", x);
     rect.setAttribute("y", y);
     rect.setAttribute("width", bw);
     rect.setAttribute("height", bh);
     rect.setAttribute("rx","8");
     rect.setAttribute("ry","8");

     var isActive = (activeValue && p.label === activeValue);
     var defaultFill = p.color ? p.color : "#0b4e88";
     var activeFill  = p.color ? p.color : "#0a76c6";
     rect.setAttribute("fill", isActive ? activeFill : defaultFill);
     rect.setAttribute("opacity", isActive ? "1" : (p.color ? "0.88" : "0.85"));
     rect.style.cursor = "pointer";

     (function(val){
       rect.addEventListener("click", function(){ onClick(val); });
     })(p.label);

     var txt = document.createElementNS("http://www.w3.org/2000/svg","text");
     txt.setAttribute("x", x + bw/2);
     txt.setAttribute("y", y - 6);
     txt.setAttribute("text-anchor","middle");
     txt.setAttribute("font-size","11");
     txt.setAttribute("font-weight","900");
     txt.setAttribute("fill","#0b1b2b");
     txt.textContent = p.value;

     var lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
     lbl.setAttribute("x", x + bw/2);
     lbl.setAttribute("y", h - 8);
     lbl.setAttribute("text-anchor","middle");
     lbl.setAttribute("font-size","10");
     lbl.setAttribute("font-weight","800");
     lbl.setAttribute("fill","#0b1b2b");
     lbl.textContent = p.label;

     svg.appendChild(rect);
     svg.appendChild(txt);
     svg.appendChild(lbl);
   }

   wrap.appendChild(svg);
   container.appendChild(wrap);
 }


/* ===================== SVG HORIZONTAL BAR CHART (click-to-filter) ===================== */

function renderHBarChart(container, title, dataPairs, activeValue, onClick, opts){
  empty(container);

opts = opts || {};
var labelFont = (typeof opts.labelFont === "number") ? opts.labelFont : 12;
var valueFont = (typeof opts.valueFont === "number") ? opts.valueFont : 12;
var rowH      = (typeof opts.rowH === "number") ? opts.rowH : 24;
var gap       = (typeof opts.gap === "number") ? opts.gap : 10;


  var wrap = el("div","chart");
  var t = el("div","chartTitle");
  t.appendChild(el("div",null,title));
  t.appendChild(el("div","hint","click bars to filter"));
  wrap.appendChild(t);

  // Chart sizing
  var w = 420;                 // viewBox width
  var topPad = 10;
  var bottomPad = 12;
  var leftPad = (opts.leftPad || 170);  // label area
  var rightPad = (opts.rightPad || 40); // space for value text

  var n = (dataPairs||[]).length;
  var h = topPad + bottomPad + (n * (rowH + gap));
  h = Math.max(120, h);

  var svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 "+w+" "+h);
  svg.style.width="100%";
  svg.style.height = Math.min((opts.maxPxHeight || 320), h) + "px";

  // Compute max
  var max = 0, i;
  for(i=0;i<n;i++){ if(dataPairs[i].value > max) max = dataPairs[i].value; }
  if(max === 0) max = 1;

  var barAreaW = w - leftPad - rightPad;

  function trunc(s, maxLen){
    s = String(s||"");
    if(s.length <= maxLen) return s;
    return s.substring(0, Math.max(0, maxLen-1)) + "…";
  }

  for(i=0;i<n;i++){
    (function(p){
      var y = topPad + i*(rowH + gap);

      var isActive = (activeValue && p.label === activeValue);
      var fill = isActive ? "#0a76c6" : "#0b4e88";
      var op = isActive ? "1" : "0.85";

      var bw = Math.round(barAreaW * (p.value/max));
      if(bw < 6 && p.value > 0) bw = 6;

      // Label (left)
      var lbl = document.createElementNS("http://www.w3.org/2000/svg","text");
      lbl.setAttribute("x", leftPad - 8);
      lbl.setAttribute("y", y + rowH - 5);
      lbl.setAttribute("text-anchor","end");
      lbl.setAttribute("font-size", String(labelFont));
      lbl.setAttribute("font-weight","800");
      lbl.setAttribute("fill","#0b1b2b");
      lbl.textContent = trunc(p.label, (opts.truncLen || 26));

      var titleNode = document.createElementNS("http://www.w3.org/2000/svg","title");
      titleNode.textContent = p.label;
      lbl.appendChild(titleNode);

      // Bar
      var rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
      rect.setAttribute("x", leftPad);
      rect.setAttribute("y", y);
      rect.setAttribute("width", bw);
      rect.setAttribute("height", rowH);
      rect.setAttribute("rx","8");
      rect.setAttribute("ry","8");
      rect.setAttribute("fill", fill);
      rect.setAttribute("opacity", op);
      rect.style.cursor = "pointer";

      // Value (right of bar)
      var val = document.createElementNS("http://www.w3.org/2000/svg","text");
      val.setAttribute("x", leftPad + bw + 6);
      val.setAttribute("y", y + rowH - 5);
      val.setAttribute("text-anchor","start");
      val.setAttribute("font-size", String(valueFont));
      val.setAttribute("font-weight","900");
      val.setAttribute("fill","#0b1b2b");
      val.textContent = p.value;

      rect.addEventListener("click", function(){ onClick(p.label); });
      lbl.addEventListener("click", function(){ onClick(p.label); });
      val.addEventListener("click", function(){ onClick(p.label); });
      lbl.style.cursor = "pointer";
      val.style.cursor = "pointer";

      svg.appendChild(lbl);
      svg.appendChild(rect);
      svg.appendChild(val);
    })(dataPairs[i]);
  }

  wrap.appendChild(svg);
  container.appendChild(wrap);
}


 /* ===================== SMALL UTILITIES ===================== */
 function uniqSorted(arr){
   var m = {}, out = [], i, v;
   for(i=0;i<arr.length;i++){
     v = arr[i];
     if(v === null || v === undefined || v === "") continue;
     v = String(v);
     if(!m[v]){ m[v]=1; out.push(v); }
   }
   out.sort(function(a,b){
     a=a.toLowerCase(); b=b.toLowerCase();
     return a<b ? -1 : (a>b ? 1 : 0);
   });
   return out;
 }
 function toggleArr(arr, v){
   var i = arr.indexOf(v);
   if(i>-1) arr.splice(i,1);
   else arr.push(v);
 }

 function groupCount(rows, field){
   var m = {}, out = [], i, v;
   for(i=0;i<rows.length;i++){
     v = rows[i][field];
     if(v && typeof v === "object" && v.Title) v = v.Title;
     if(v === null || v === undefined || v === "") v = "(Blank)";
     v = String(v);
     m[v] = (m[v]||0) + 1;
   }
   for(var k in m){ if(m.hasOwnProperty(k)) out.push({label:k, value:m[k]}); }
   out.sort(function(a,b){ return b.value - a.value; });
   return out;
 }

 function matchesSearch(item, fields, q){
   if(!q) return true;
   q = q.toLowerCase();

function _daysSince(dateStr){
  if(!dateStr) return 0;
  var d = new Date(dateStr);
  if(isNaN(d.getTime())) return 0;
  var now = new Date();
  var ms = now.getTime() - d.getTime();
  var days = Math.floor(ms / (1000*60*60*24));
  return (days < 0) ? 0 : days;
}

function _rerenderPreserveFocusById(id, selStart, selEnd){

        if(typeof selStart === "number" && typeof selEnd === "number" && elx.setSelectionRange){
          elx.setSelectionRange(selStart, selEnd);
        }
      }
    } catch(e){}
  }, 0);
}

function _foiaIsClosedOrTransferred(r){

  return (at === "case closed" || at === "transferred"); }


/* ===================== FOIA: DATA LOAD ===================== */ 
function _foiaLoad(){
  setLoading(true, "Loading FOIA lists...");

  // These must be visible to later .then() blocks
  var iRequest = null, iTaskNotes = null, iNewest = null, iTech = null, iCurrAO = null, iSpecPOC = null, iLibrary = null;

  function safe(internalName){ return internalName ? internalName : null; }

  // Build FOIA select/expand after we learn internal names
  function buildFoiaQueryParts(){
    var foiaSelectParts = [
      "Id","Title","Created","Modified",
      "StartDate","ActionDate","DaysSinceModified",
      "CurrentStatus","PositionStatus","LastActionTaken",
      "RequestType","OPR"
    ];

    // Multi-line text fields (internal names)
    if(safe(iRequest))   foiaSelectParts.push(iRequest);
    if(safe(iTaskNotes)) foiaSelectParts.push(iTaskNotes);
    if(safe(iNewest))    foiaSelectParts.push(iNewest);

    // Hyperlink field (still loaded for display if you want, but button is removed)
    if(safe(iLibrary))   foiaSelectParts.push(iLibrary);

    // Lookup / Person fields
    var foiaExpandParts = [];

    if(safe(iCurrAO)){
      foiaSelectParts.push(iCurrAO + "/Title");
      foiaExpandParts.push(iCurrAO);
    }
    if(safe(iTech)){
      foiaSelectParts.push(iTech + "/Title");
      foiaExpandParts.push(iTech);
    }
    if(safe(iSpecPOC)){
      foiaSelectParts.push(iSpecPOC + "/Title");
      foiaExpandParts.push(iSpecPOC);
    }

    // Author/Editor (optional but safe)
    foiaSelectParts.push("Author/Title","Editor/Title");
    foiaExpandParts.push("Author","Editor");

    return {
      select: foiaSelectParts.join(","),
      expand: foiaExpandParts.join(",")
    };
  }

  // Time logs query (field-map driven + safe)
  var tFOIACase = null, tHours = null, tDate = null, tActionTaken = null, tNextAction = null, tNextOffice = null, tLastActionDate = null, tOPR = null, tPOC = null;

  function buildTimeQueryParts(){
    var sel = ["Id","Title","Modified","Created"];
    var exp = [];

    // Lookup fields -> /Title + expand
    if(tFOIACase){ sel.push(tFOIACase + "/Title"); exp.push(tFOIACase); }
    if(tOPR){      sel.push(tOPR + "/Title");      exp.push(tOPR); }
    if(tPOC){      sel.push(tPOC + "/Title");      exp.push(tPOC); }

    // Normal fields
    if(tHours) sel.push(tHours);
    if(tDate) sel.push(tDate);
    if(tActionTaken) sel.push(tActionTaken);
    if(tNextAction) sel.push(tNextAction);
    if(tNextOffice) sel.push(tNextOffice);
    if(tLastActionDate) sel.push(tLastActionDate);

    return { select: sel.join(","), expand: exp.join(",") };
  }

  // POC query
  var pocSelect = ["Id","Title","OfficePOC/Title","Modified","Created"].join(",");
  var pocsExpand = "OfficePOC";

  return spGetFieldMap(CONFIG.LISTS.FOIA)
    .then(function(F){
      // Titles MUST match what users see on the column settings page
      iRequest   = F["Request Description"];
      iTaskNotes = F["All Notes"];
      iNewest    = F["Newest Comment"];
      iTech      = F["Technician Assigned"];
      iCurrAO    = F["Current Action Office"];
      iSpecPOC   = F["SpecialPOC"];
      iLibrary   = F["FOIA Library"];

      var q = buildFoiaQueryParts();
      return spGetAll(CONFIG.LISTS.FOIA, q.select, q.expand, null, "Modified desc", CONFIG.TOP);
    })
    .then(function(foiaRows){
      foiaRows = foiaRows || [];

      for(var i=0;i<foiaRows.length;i++){
        var r = foiaRows[i];

        // Copy mapped fields into the names used everywhere else
        if(iRequest && r[iRequest] != null)     r.Request = r[iRequest];
        if(iTaskNotes && r[iTaskNotes] != null) r.TaskNotes = r[iTaskNotes];
        if(iNewest && r[iNewest] != null)       r.NewestComment = r[iNewest];
        if(iLibrary && r[iLibrary] != null)     r.FOIALibrary = r[iLibrary];

        // Dynamic inactivity
        r._InactivityDays = _daysSince(r.Modified);

        // Keep legacy column populated for table/detail that still read DaysSinceModified
        r.DaysSinceModified = r._InactivityDays;
      }

      STATE.data.foia = foiaRows;

      // Default selected row
      if(!STATE.table.FOIA || !STATE.table.FOIA.selectedId){
        if(!STATE.table.FOIA) STATE.table.FOIA = {};
        if(STATE.data.foia.length) STATE.table.FOIA.selectedId = STATE.data.foia[0].Id;
      }

      return spGetFieldMap(CONFIG.LISTS.TIME).then(function(T){
        // These titles MUST match what users see in the TIME list column settings.
        tFOIACase       = T["FOIA Case"] || T["FOIACase"];
        tHours          = T["Time Spent (Hours)"] || T["TimeSpent (Hours)"] || T["Time Spent"];
        tDate           = T["Date"];
        tActionTaken    = T["Action Taken"] || T["ActionTaken"];
        tNextAction     = T["Next Action"] || T["NextAction"];
        tNextOffice     = T["Next Office"] || T["NextOffice"];
        tLastActionDate = T["Date of last action"] || T["Date of Last Action"] || T["Date_x0020_of_x0020_last_x0020_a"];
        tOPR            = T["OPR"];
        tPOC            = T["POC"];

        var tq = buildTimeQueryParts();
        var order = (tDate ? (tDate + " desc") : "Modified desc");

        return spGetAll(CONFIG.LISTS.TIME, tq.select, tq.expand, null, order, CONFIG.TOP);
      });
    })
    .then(function(timeRows){
      timeRows = timeRows || [];

      for(var t=0;t<timeRows.length;t++){
        var tr = timeRows[t];

        // Hours
        var rawH = (tHours && tr[tHours] != null) ? tr[tHours] : tr.TimeSpent_x0028_Hours_x0029_;
        tr.TimeSpentHours = toNum(rawH);

        // Next Office
        var rawO = (tNextOffice && tr[tNextOffice] != null) ? tr[tNextOffice] : tr.NextOffice;
        tr.NextOfficeName = (rawO && rawO.Title) ? rawO.Title : rawO;

        // Optional log date
        if(tDate && tr[tDate] != null) tr._LogDate = tr[tDate];
      }

      STATE.data.time = timeRows;

      return spGetAll(CONFIG.LISTS.POC, pocSelect, pocsExpand, null, "Title asc", CONFIG.TOP);
    })
    .then(function(pocRows){
      STATE.data.poc = pocRows || [];
      setLoading(false, "FOIA loaded • Cases "+STATE.data.foia.length+" • Time logs "+(STATE.data.time||[]).length);
      return true;
    })
    .catch(function(err){
      setLoading(false, "FOIA load failed");
      throw err;
    });
}


/* ===================== FOIA: FILTERING ===================== */ 
function _foiaApplyFilters(raw){
  var f = STATE.filters.FOIA;
  var rows = raw.slice(0);

  // Multi-select filters
  if(f.office && f.office.length){
    rows = rows.filter(function(r){ return f.office.indexOf(r.PositionStatus) > -1; });
  }
  if(f.status && f.status.length){
    rows = rows.filter(function(r){ return f.status.indexOf(r.CurrentStatus) > -1; });
  }
  if(f.opr && f.opr.length){
    rows = rows.filter(function(r){ return f.opr.indexOf(r.OPR) > -1; });
  }
  if(f.reqType && f.reqType.length){
    rows = rows.filter(function(r){ return f.reqType.indexOf(r.RequestType) > -1; });
  }

  // Inactivity thresholds (dynamic: today - Modified)
  if(f.inactivity === ">=Warn"){
    rows = rows.filter(function(r){ return toNum(r._InactivityDays) >= CONFIG.INACTIVITY_WARN; });
  } else if(f.inactivity === ">=Bad"){
    rows = rows.filter(function(r){ return toNum(r._InactivityDays) >= CONFIG.INACTIVITY_BAD; });
  }

  // Search across key strings
  rows = rows.filter(function(r){
    return matchesSearch(r, [
      "Title","Request","TaskNotes","NewestComment","LastActionTaken",
      "CurrentStatus","PositionStatus","RequestType","OPR"
    ], f.search);
  });

  // Chart drill filter (single)
  if(f.chartFilter && f.chartFilter.field && f.chartFilter.value){
    rows = rows.filter(function(r){
      return String(r[f.chartFilter.field] || "") === f.chartFilter.value;
    });
  }

  return rows;
}

/* ===================== FOIA: TABLE PANEL (ACTIVE or CLOSED) ===================== */ function _foiaRenderTablePanel(title, rowsIn, which){
  var pTable = el("div","panel");
  var h1 = el("div","panel-h");
  h1.appendChild(el("div",null,title));
  pTable.appendChild(h1);

  var b1 = el("div","panel-b");
  var table = el("table","tbl");

  var st = STATE.table.FOIA;

  var cols = (which === "closed") ? [
    {k:"Title", t:"Case Number"},
    {k:"LastActionTaken", t:"Action Taken"}
  ] : [
    {k:"Title", t:"Case Number"},
    {k:"LastActionTaken", t:"Action Taken"},
    {k:"DaysSinceModified", t:"Inactivity"},
    {k:"CurrentStatus", t:"Action Needed"},
    {k:"PositionStatus", t:"Sitting With"}
  ];

  var COL_RENDER = {
    Title: function(r){ return tdLink(r.Title, function(){ st.selectedId = r.Id; render(); }); },
    LastActionTaken: function(r){ return tdTxt(r.LastActionTaken); },
    DaysSinceModified: function(r){ return tdHtml(inactivityBadge(toNum(r.DaysSinceModified))); },
    CurrentStatus: function(r){ return tdTxt(r.CurrentStatus); },
    PositionStatus: function(r){ return tdTxt(r.PositionStatus); }
  };

  function getPage(){
    return (which === "closed") ? st.closedPage : st.activePage;
  }
  function setPage(n){
    if(which === "closed") st.closedPage = n;
    else st.activePage = n;
  }

  function sortRows(rows){
    var key = st.sortKey, dir = st.sortDir;
    rows.sort(function(a,b){
      var va = a[key], vb = b[key];

      if(key === "ActionDate"){
        va = new Date(va||0).getTime();
        vb = new Date(vb||0).getTime();
      } else if(key === "DaysSinceModified" || key === "_InactivityDays"){
        va = toNum(va); vb = toNum(vb);
      } else {
        if(typeof va === "string") va = va.toLowerCase();
        if(typeof vb === "string") vb = vb.toLowerCase();
      }

      if(va < vb) return dir==="asc" ? -1 : 1;
      if(va > vb) return dir==="asc" ? 1 : -1;
      return 0;
    });
    return rows;
  }

  var rows = sortRows((rowsIn||[]).slice(0));
  var total = rows.length;
  var pageSize = CONFIG.TABLE_PAGE_SIZE;
  var pages = Math.max(1, Math.ceil(total / pageSize));

  var page = getPage();
  if(page > pages) page = pages;
  if(page < 1) page = 1;
  setPage(page);

  var start = (page-1) * pageSize;
  var pageRows = rows.slice(start, start+pageSize);

  // header
  var thead = el("thead");
  var trh = el("tr");
  for(var i=0;i<cols.length;i++){
    (function(c){
      var th = el("th",null,c.t);
      if(st.sortKey === c.k) th.textContent = c.t + (st.sortDir==="asc" ? " ▲" : " ▼");
      on(th,"click",function(){
        if(st.sortKey === c.k) st.sortDir = (st.sortDir==="asc" ? "desc" : "asc");
        else { st.sortKey = c.k; st.sortDir = "asc"; }
        render();
      });
      trh.appendChild(th);
    })(cols[i]);
  }
  thead.appendChild(trh);
  table.appendChild(thead);

  // body
  var tbody = el("tbody");
  for(i=0;i<pageRows.length;i++){
    (function(r){
      var tr = el("tr");
      if(st.selectedId === r.Id) tr.classList.add("rowSel");
      on(tr,"click",function(){
        st.selectedId = r.Id;
        render();
      });

      for(var ci=0; ci<cols.length; ci++){
        var rend = COL_RENDER[cols[ci].k];
        if(rend) tr.appendChild(rend(r));
      }

      tbody.appendChild(tr);
    })(pageRows[i]);
  }
  table.appendChild(tbody);

  b1.appendChild(table);

  // pager
  var pager = el("div","pager");
  var prev = el("button","pbtn","Prev");
  prev.disabled = (page <= 1);
  on(prev,"click",function(){ setPage(getPage()-1); render(); });

  var next = el("button","pbtn","Next");
  next.disabled = (page >= pages);
  on(next,"click",function(){ setPage(getPage()+1); render(); });

  pager.appendChild(el("div","muted","Page "+page+" / "+pages+" • "+total+" rows"));
  pager.appendChild(prev);
  pager.appendChild(next);
  b1.appendChild(pager);

  pTable.appendChild(b1);
  return pTable;
}

/* ===================== OI: DATA LOAD ===================== */ 
function _oiLoad(){
  setLoading(true, "Loading OIs...");

  // Active OIs list GUID + columns per doc  [oai_citation:0‡DOC SSM Lists and Columns 2.txt](sediment://file_000000005534720c882669cd45c53b51)
  // Assignedto is a Person field, so expand Assignedto/Title for display.

  var oiSelect = [
    "Id","Title","StartDate","DueDate","Assignedto/Title","TaskNotes",
    "PositionStatus","CurrentStatus","ReceivedDate","Deadline",
    "ReviewcompletionDate","ReviewComplexity","PercentageChanged",
    "DateCompleted","Timespentonreview","Temp","Modified","Created"
  ].join(",");

  var oiExpand = "Assignedto";

  return spGetAll(CONFIG.LISTS.OI, oiSelect, oiExpand, null, "Modified desc", CONFIG.TOP)
    .then(function(items){
      STATE.data.oi = items || [];

      if(!STATE.table.OI.selectedId && STATE.data.oi.length){
        STATE.table.OI.selectedId = STATE.data.oi[0].Id;
      }

      setLoading(false, "OIs loaded • "+STATE.data.oi.length);
      return true;
    })
    .catch(function(err){
      setLoading(false, "OIs load failed");
      throw err;
    });
}

/* ===================== OI: FILTERING ===================== */ 
function _oiApplyFilters(raw){
  var f = STATE.filters.OI;
  var rows = raw.slice(0);

  // Year filter: allow StartDate year OR DueDate year
  if(f.year && f.year !== "All"){
    rows = rows.filter(function(r){
      return yearOf(r.StartDate) === f.year || yearOf(r.DueDate) === f.year;
    });
  }

  if(f.sitting && f.sitting.length){
    rows = rows.filter(function(r){ return f.sitting.indexOf(r.PositionStatus) > -1; });
  }
  if(f.status && f.status.length){
    rows = rows.filter(function(r){ return f.status.indexOf(r.CurrentStatus) > -1; });
  }
  if(f.assigned && f.assigned.length){
    rows = rows.filter(function(r){
      var a = (r.Assignedto && r.Assignedto.Title) ? r.Assignedto.Title : "";
      return f.assigned.indexOf(a) > -1;
    });
  }

  // Search
  rows = rows.filter(function(r){
    return matchesSearch(r, [
      "Title","TaskNotes","CurrentStatus","PositionStatus"
    ], f.search);
  });

  // Chart drill filter (single)
  if(f.chartFilter && f.chartFilter.field && f.chartFilter.value){
    rows = rows.filter(function(r){
      var v = r[f.chartFilter.field];
      // handle person fields if ever used as chart filter
      if(v && typeof v === "object" && v.Title) v = v.Title;
      return String(v || "") === f.chartFilter.value;
    });
  }

  return rows;
}

  b.appendChild(el("div","footnote","Tip: Click chart bars to drill down; click the same bar again to clear."));

  return p;

function _oiBuildTablePanel(rowsIn, headerTitle, st, selectedSt){
  var pTable = el("div","panel");
  var h1 = el("div","panel-h");
  h1.appendChild(el("div",null,headerTitle));
  pTable.appendChild(h1);

  var b1 = el("div","panel-b");
  var table = el("table","tbl");

  var cols = [
    {k:"Title", t:"OI"},
    {k:"PositionStatus", t:"Sitting With"},
    {k:"CurrentStatus", t:"Status"},
    {k:"DueDate", t:"Due"},
    {k:"Assignedto", t:"Assigned To"}
  ];

  function sortRows(rows){
    var key = st.sortKey, dir = st.sortDir;
    rows.sort(function(a,b){
      var va = a[key], vb = b[key];

      if(key === "DueDate" || key === "StartDate"){
        va = new Date(va||0).getTime();
        vb = new Date(vb||0).getTime();
      } else if(key === "Assignedto"){
        va = (va && va.Title) ? va.Title : "";
        vb = (vb && vb.Title) ? vb.Title : "";
        va = va.toLowerCase(); vb = vb.toLowerCase();
      } else {
        if(typeof va === "string") va = va.toLowerCase();
        if(typeof vb === "string") vb = vb.toLowerCase();
      }

      if(va < vb) return dir==="asc" ? -1 : 1;
      if(va > vb) return dir==="asc" ? 1 : -1;
      return 0;
    });
    return rows;
  }

  var rows = sortRows((rowsIn || []).slice(0));
  var total = rows.length;
  var pageSize = CONFIG.TABLE_PAGE_SIZE;
  var pages = Math.max(1, Math.ceil(total / pageSize));
  if(st.page > pages) st.page = pages;
  if(st.page < 1) st.page = 1;

  var start = (st.page-1) * pageSize;
  var pageRows = rows.slice(start, start+pageSize);

  // header
  var thead = el("thead");
  var trh = el("tr");
  for(var i=0;i<cols.length;i++){
    (function(c){
      var th = el("th",null,c.t);
      if(st.sortKey === c.k) th.textContent = c.t + (st.sortDir==="asc" ? " ▲" : " ▼");
      on(th,"click",function(){
        if(st.sortKey === c.k) st.sortDir = (st.sortDir==="asc" ? "desc" : "asc");
        else { st.sortKey = c.k; st.sortDir = "asc"; }
        render();
      });
      trh.appendChild(th);
    })(cols[i]);
  }
  thead.appendChild(trh);
  table.appendChild(thead);

  // body
  var tbody = el("tbody");
  for(i=0;i<pageRows.length;i++){
    (function(r){
      var tr = el("tr");
      if(selectedSt.selectedId === r.Id) tr.classList.add("rowSel");
      on(tr,"click",function(){
        selectedSt.selectedId = r.Id;
        render();
      });

      tr.appendChild(tdLink(r.Title, function(){ selectedSt.selectedId = r.Id; render(); }));
      tr.appendChild(tdTxt(r.PositionStatus));
      tr.appendChild(tdTxt(r.CurrentStatus));
      tr.appendChild(tdTxt(fmtDate(r.DueDate)));
      tr.appendChild(tdTxt((r.Assignedto && r.Assignedto.Title) ? r.Assignedto.Title : ""));

      tbody.appendChild(tr);
    })(pageRows[i]);
  }
  table.appendChild(tbody);
  b1.appendChild(table);

  // pager
  var pager = el("div","pager");
  var prev = el("button","pbtn","Prev");
  prev.disabled = (st.page <= 1);
  on(prev,"click",function(){ st.page--; render(); });

  var next = el("button","pbtn","Next");
  next.disabled = (st.page >= pages);
  on(next,"click",function(){ st.page++; render(); });

  pager.appendChild(el("div","muted","Page "+st.page+" / "+pages+" • "+total+" rows"));
  pager.appendChild(prev);
  pager.appendChild(next);
  b1.appendChild(pager);

  pTable.appendChild(b1);
  return pTable;
}

/* ===================== RECORDS: VALUE CLEANERS (NO [object Object]) ===================== */

// Generic "stringify SharePoint value" (handles People/Lookup shapes + results arrays) 
function _recText(v){
  if(v === null || v === undefined) return "";

  if(typeof v === "string" || typeof v === "number" || typeof v === "boolean") return String(v);

  // arrays
  if(Array.isArray(v)){
    var parts = [];
    for(var i=0;i<v.length;i++){
      var s = _recText(v[i]);
      if(s) parts.push(s);
    }
    return parts.join(", ");
  }

  // SharePoint multi-value can be { results: [...] }
  try{
    if(typeof v === "object" && v.results && Array.isArray(v.results)){
      return _recText(v.results);
    }
  }catch(e){}

  // Person/Lookup/etc.
  try{
    if(typeof v === "object"){
      if(v.Email) return String(v.Email);
      if(v.EMail) return String(v.EMail);
      if(v.Mail)  return String(v.Mail);
      if(v.Title) return String(v.Title);
      if(v.Name)  return String(v.Name);
      if(v.Url)   return String(v.Url);
      try { return JSON.stringify(v); } catch(e2){}
    }
  }catch(e3){}

  return String(v);
}

function _recCleanText(v){
  var s = _recText(v);
  if(!s) return "";
  s = s.replace(/\s+/g, " ").trim();
  if(s === "undefined" || s === "null" || s === "[object Object]") return "";
  return s;
}

// Convenience for Email display (prefers email-like strings) 
function _recEmailText(v){
  var s = _recCleanText(v);
  if(!s) return "";

  // if it looks like JSON, try extracting an email
  if(s.charAt(0) === "{" || s.charAt(0) === "["){
    var m = s.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i);
    return m ? m[0] : s;
  }

  var m2 = s.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i);
  if(m2) return m2[0];

  return s;
}

// KV that hides empty values
function _recKvIf(label, value){
  var v = _recCleanText(value);
  if(!v) return null;
  return kv(label, v);
}

/* ===================== RECORDS: DATA LOAD (FIELD-MAP DRIVEN) ===================== */ 
function _recLoad(){
  _recEnsureStateDefaults();
  setLoading(true, "Loading Records lists...");

  // ---- RM internal names (Record Managers) ----
  var rmEmail=null, rmPrimaryInv=null, rmAdditionalInv=null, rmUnit=null, rmPosition=null;
  var rmCompDate=null, rmCertValidation=null, rmApptValidation=null, rmAfrimsAccess=null, rmErmAccess=null;
  var rmRisk=null, rmPhone=null;

  // ---- RI internal names (Record Inventories) ----
  var riInventory=null, riApptLetter=null, riAudited=null, riActionNeeded=null, riAssignedTech=null, riDeadline=null;

  function pick(map, arr){
    for(var i=0;i<arr.length;i++){
      if(map[arr[i]]) return map[arr[i]];
    }
    return null;
  }

  function buildRMQuery(){
    var sel = ["Id","Title","Modified","Created"];
    var exp = [];

    function addText(internal){ if(internal) sel.push(internal); }
    function addLookupTitle(internal){
      if(!internal) return;
      sel.push(internal + "/Title");
      exp.push(internal);
    }

    // Email can be Person/Lookup – safest is expand Title
    if(rmEmail) addLookupTitle(rmEmail);

    addText(rmPrimaryInv);
    addText(rmAdditionalInv);
    addText(rmUnit);
    addText(rmPosition);
    addText(rmPhone);

    addText(rmCompDate);
    addText(rmCertValidation);
    addText(rmApptValidation);
    addText(rmAfrimsAccess);
    addText(rmErmAccess);
    addText(rmRisk);

    return { select: sel.join(","), expand: (exp.length ? exp.join(",") : "") };
  }

  function buildRIQuery(){
    var sel = ["Id","Title","Modified","Created"];
    var exp = [];

    function addText(internal){ if(internal) sel.push(internal); }
    function addLookupTitle(internal){
      if(!internal) return;
      sel.push(internal + "/Title");
      exp.push(internal);
    }

    addText(riInventory);
    addText(riApptLetter);
    addText(riAudited);
    addText(riActionNeeded);
    addText(riDeadline);
    addLookupTitle(riAssignedTech);

    return { select: sel.join(","), expand: (exp.length ? exp.join(",") : "") };
  }

  return Promise.all([
    spGetFieldMap(CONFIG.LISTS.RM),
    spGetFieldMap(CONFIG.LISTS.RI)
  ]).then(function(allMaps){
    var RM = allMaps[0] || {};
    var RI = allMaps[1] || {};

    // RM (titles must match displayed column titles)
    rmEmail          = pick(RM, ["Email"]);
    rmPrimaryInv     = pick(RM, ["Primary Inventory"]);
    rmAdditionalInv  = pick(RM, ["Additional Inventories"]);
    rmUnit           = pick(RM, ["Unit"]);
    rmPosition       = pick(RM, ["Are you a Primary or Alternate (Unit/Office)"]);
    rmPhone          = pick(RM, ["Phone", "Telephone", "Phone Number", "DSN", "Commercial Phone"]);

    rmCompDate       = pick(RM, ["Comp Date"]);
    rmCertValidation = pick(RM, ["Certification Validation"]);
    rmApptValidation = pick(RM, ["Appointment Letter Validation"]);
    rmAfrimsAccess   = pick(RM, ["AFRIMS Access"]);
    rmErmAccess      = pick(RM, ["ERM Access"]);
    rmRisk           = pick(RM, ["Risk"]);

    // RI
    riInventory    = pick(RI, ["Inventory"]);
    riApptLetter   = pick(RI, ["Appointment Letter"]);
    riAudited      = pick(RI, ["Audited"]);
    riActionNeeded = pick(RI, ["Action Needed"]);
    riAssignedTech = pick(RI, ["Assigned Technician"]);
    riDeadline     = pick(RI, ["Deadline"]);

    var qRM = buildRMQuery();
    var qRI = buildRIQuery();

    return Promise.all([
      spGetAll(CONFIG.LISTS.RM, qRM.select, qRM.expand || null, null, "Modified desc", CONFIG.TOP),
      spGetAll(CONFIG.LISTS.RI, qRI.select, qRI.expand || null, null, "Modified desc", CONFIG.TOP)
    ]);
  }).then(function(rows){
    var rmRows = rows[0] || [];
    var riRows = rows[1] || [];

    // Normalize RM rows into canonical props used by UI
    for(var i=0;i<rmRows.length;i++){
      var r = rmRows[i];

      // Email is Person/Lookup – force string-safe
      r.Email = "";
      if(rmEmail){
        var ev = r[rmEmail];
        if(ev && typeof ev === "object" && ev.Title) r.Email = ev.Title;
        else if(r[rmEmail + "/Title"] != null) r.Email = String(r[rmEmail + "/Title"]);
        else if(ev != null) r.Email = _recText(ev);
      }

      r.Unit = (rmUnit && r[rmUnit] != null) ? r[rmUnit] : "";
      r.Position = (rmPosition && r[rmPosition] != null) ? r[rmPosition] : "";

      r.PrimaryInventory = (rmPrimaryInv && r[rmPrimaryInv] != null) ? r[rmPrimaryInv] : "";
      r.AdditionalInventories = (rmAdditionalInv && r[rmAdditionalInv] != null) ? r[rmAdditionalInv] : "";

      r.Phone = (rmPhone && r[rmPhone] != null) ? _recText(r[rmPhone]) : "";

      r.CompDate = (rmCompDate && r[rmCompDate] != null) ? r[rmCompDate] : "";
      r.CertificationValidation = (rmCertValidation && r[rmCertValidation] != null) ? r[rmCertValidation] : "";
      r.AppointmentLetterValidation = (rmApptValidation && r[rmApptValidation] != null) ? r[rmApptValidation] : "";
      r.AFRIMSAccess = (rmAfrimsAccess && r[rmAfrimsAccess] != null) ? r[rmAfrimsAccess] : "";
      r.ERMAccess = (rmErmAccess && r[rmErmAccess] != null) ? r[rmErmAccess] : "";
      r.Risk = (rmRisk && r[rmRisk] != null) ? r[rmRisk] : "";
    }

    // Normalize RI rows into canonical props
    for(var j=0;j<riRows.length;j++){
      var x = riRows[j];
      x.Inventory = (riInventory && x[riInventory] != null) ? x[riInventory] : "";
      x.AppointmentLetter = (riApptLetter && x[riApptLetter] != null) ? x[riApptLetter] : "";
      x.Audited = (riAudited && x[riAudited] != null) ? x[riAudited] : "";
      x.ActionNeeded = (riActionNeeded && x[riActionNeeded] != null) ? x[riActionNeeded] : "";

      x.AssignedTechnician = "";
      if(riAssignedTech){
        var tv = x[riAssignedTech];
        if(tv && typeof tv === "object" && tv.Title) x.AssignedTechnician = tv.Title;
        else if(x[riAssignedTech + "/Title"] != null) x.AssignedTechnician = String(x[riAssignedTech + "/Title"]);
        else if(tv != null) x.AssignedTechnician = _recText(tv);
      }

      x.Deadline = (riDeadline && x[riDeadline] != null) ? x[riDeadline] : "";
    }

    STATE.data.rm = rmRows;
    STATE.data.ri = riRows;

    // Default select RM for the right-side details
    if(!STATE.recordsUI.selectedRMId && STATE.data.rm.length){
      STATE.recordsUI.selectedRMId = STATE.data.rm[0].Id;
    }

    setLoading(false, "Records loaded • RM "+STATE.data.rm.length+" • Inventory "+STATE.data.ri.length);
    return true;
  }).catch(function(err){
    setLoading(false, "Records load failed");
    throw err;
  });
}

/* ===================== RECORDS: MERGE + NORMALIZE MODEL ===================== */ 
function _recMerge(rmRows, riRows){
  var out = [];
  var i;
  for(i=0;i<(rmRows||[]).length;i++) out.push(_recNormalizeRM(rmRows[i]));
  for(i=0;i<(riRows||[]).length;i++) out.push(_recNormalizeRI(riRows[i]));
  return out;
}

function _recNormalizeRM(r){
  return {
    _type: "RM",
    _sid: "RM:" + r.Id,
    Id: r.Id,

    Title: _recCleanText(r.Title),
    Email: _recEmailText(r.Email),
    Phone: _recCleanText(r.Phone),
    Unit: _recCleanText(r.Unit),
    Position: _recCleanText(r.Position),

    PrimaryInventory: _recCleanText(r.PrimaryInventory),
    AdditionalInventories: _recCleanText(r.AdditionalInventories),

    AppointmentLetterValidation: _recCleanText(r.AppointmentLetterValidation),
    CertificationValidation: _recCleanText(r.CertificationValidation),
    AFRIMSAccess: _recCleanText(r.AFRIMSAccess),
    ERMAccess: _recCleanText(r.ERMAccess),

    Risk: _recCleanText(r.Risk),

    Inventory: "",
    AppointmentLetter: "",
    Audited: "",
    ActionNeeded: "",
    AssignedTechnician: "",
    Deadline: "",

    Modified: r.Modified,
    Created: r.Created
  };
}

function _recNormalizeRI(r){
  return {
    _type: "RI",
    _sid: "RI:" + r.Id,
    Id: r.Id,

    Title: _recCleanText(r.Title),
    Unit: "",
    Position: "",

    Inventory: _recCleanText(r.Inventory),
    AppointmentLetter: _recCleanText(r.AppointmentLetter),
    Audited: _recCleanText(r.Audited),
    ActionNeeded: _recCleanText(r.ActionNeeded),
    AssignedTechnician: _recCleanText(r.AssignedTechnician),
    Deadline: _recCleanText(r.Deadline),

    Risk: "",

    Email: "",
    Phone: "",
    PrimaryInventory: "",
    AdditionalInventories: "",
    AppointmentLetterValidation: "",
    CertificationValidation: "",
    AFRIMSAccess: "",
    ERMAccess: "",

    Modified: r.Modified,
    Created: r.Created
  };
}

/* ===================== RECORDS: FILTERING (LEFT) ===================== */ function _recApplyFilters(raw){
  _recEnsureStateDefaults();
  var f = STATE.filters.RECORDS;

  if(!Array.isArray(f.unit)) f.unit = [];
  if(!Array.isArray(f.position)) f.position = [];
  if(!Array.isArray(f.apptRM)) f.apptRM = [];
  if(!Array.isArray(f.cert)) f.cert = [];
  if(!Array.isArray(f.afrims)) f.afrims = [];
  if(!Array.isArray(f.erm)) f.erm = [];
  if(!Array.isArray(f.riskGroup)) f.riskGroup = [];
  if(!Array.isArray(f.riskRaw)) f.riskRaw = [];
  if(typeof f.search !== "string") f.search = "";
  if(!f.chartFilter) f.chartFilter = null;
  if(typeof f.showAllRisks !== "boolean") f.showAllRisks = false;

  var rows = (raw || []).slice(0);

  if(f.unit.length){
    rows = rows.filter(function(r){ return f.unit.indexOf(r.Unit) > -1; });
  }
  if(f.position.length){
    rows = rows.filter(function(r){ return f.position.indexOf(r.Position) > -1; });
  }

  if(f.apptRM.length){
    rows = rows.filter(function(r){
      return (r._type !== "RM") ? true : (f.apptRM.indexOf(String(r.AppointmentLetterValidation||"")) > -1);
    });
  }
  if(f.cert.length){
    rows = rows.filter(function(r){
      return (r._type !== "RM") ? true : (f.cert.indexOf(_recCertBucket(String(r.CertificationValidation||""))) > -1);
    });
  }
  if(f.afrims.length){
    rows = rows.filter(function(r){
      return (r._type !== "RM") ? true : (f.afrims.indexOf(String(r.AFRIMSAccess||"")) > -1);
    });
  }
  if(f.erm.length){
    rows = rows.filter(function(r){
      return (r._type !== "RM") ? true : (f.erm.indexOf(String(r.ERMAccess||"")) > -1);
    });
  }

  if(f.riskGroup.length){
    rows = rows.filter(function(r){
      if(r._type !== "RM") return true;
      var g = _recRiskGroup(r.Risk || "");
      return f.riskGroup.indexOf(g) > -1;
    });
  }

  if(f.showAllRisks && f.riskRaw.length){
    rows = rows.filter(function(r){
      if(r._type !== "RM") return true;
      return f.riskRaw.indexOf(String(r.Risk||"")) > -1;
    });
  }

  rows = rows.filter(function(r){
    return matchesSearch(r, [
      "Title","Email","Phone","Unit","Position",
      "PrimaryInventory","AdditionalInventories",
      "AppointmentLetterValidation","CertificationValidation","AFRIMSAccess","ERMAccess","Risk",
      "Inventory","AppointmentLetter","ActionNeeded","AssignedTechnician"
    ], f.search);
  });

  if(f.chartFilter){
    if(typeof f.chartFilter.fn === "function"){
      rows = rows.filter(function(r){
        try { return !!f.chartFilter.fn(r); } catch(e){ return true; }
      });
    } else if(f.chartFilter.field && f.chartFilter.value){
      rows = rows.filter(function(r){
        return String(r[f.chartFilter.field] || "") === f.chartFilter.value;
      });
    }
  }

  return rows;
}

/* ===================== RIGHT SIDE: SINGLE SECTION RENDER ===================== */ function _recRenderSingleSection(filteredAll){
  _recEnsureStateDefaults();

  var ui = STATE.recordsUI;

  // Split from LEFT filtered set
  var baseRM = [];
  var baseRI = [];
  for(var i=0;i<(filteredAll||[]).length;i++){
    if(filteredAll[i]._type === "RM") baseRM.push(filteredAll[i]);
    else if(filteredAll[i]._type === "RI") baseRI.push(filteredAll[i]);
  }

  // Center rows are baseRM + optional pieFilter (pieFilter does NOT change pies)
  var centerRM = baseRM.slice(0);
  if(ui.pieFilter && typeof ui.pieFilter.fn === "function"){
    centerRM = centerRM.filter(function(r){
      try { return !!ui.pieFilter.fn(r); } catch(e){ return true; }
    });
  }

  // Ensure selectedRMId is valid
  if(centerRM.length){
    var found = false;
    for(i=0;i<centerRM.length;i++){
      if(String(centerRM[i].Id) === String(ui.selectedRMId)){ found = true; break; }
    }
    if(!found) ui.selectedRMId = centerRM[0].Id;
  } else {
    ui.selectedRMId = null;
  }

  var outer = el("div","recordsSingle");

  // Top pies
  outer.appendChild(_recRenderPieRow(baseRM, baseRI));

  // Middle: breakdown + details
  var mid = el("div","recordsMid");
  mid.style.display = "grid";
  mid.style.gridTemplateColumns = "1fr 360px";
  mid.style.gap = "10px";

  mid.appendChild(_recRenderBreakdownCenter(centerRM));
  mid.appendChild(_recRenderRMDetails(ui.selectedRMId, centerRM));

  outer.appendChild(mid);

  return outer;
}

/* ===================== PIE ROW ===================== */ 
function _recRenderPieRow(baseRM, baseRI){

  var p = el("div","panel");
  var h = el("div","panel-h");

  on(clear,"click",function(){
    ui.pieFilter = null;
    render();
  });
  h.appendChild(clear);

  p.appendChild(h);

  var b = el("div","panel-b");
  b.style.padding = "10px";

  grid.style.display = "grid";
  grid.style.gridTemplateColumns = "repeat(4, minmax(180px, 1fr))";
  grid.style.gap = "10px";

  var C_GREEN = "#2ecc71";
  var C_YELL  = "#f1c40f";
  var C_RED   = "#e74c3c";
  var C_BLACK = "#111111";

  // Appointment Letters (from RI)
  grid.appendChild(_recPiePanel(
    "APPOINTMENT LETTERS",
    _recPieData_AppointmentLetters(baseRI),
    "PIE_APPT",

      return function(rm){

        if(clickedLabel === "Verified") return cls === "good";
        if(clickedLabel === "Incorrect/Missing") return cls === "bad";
        return cls === "warn";
      };
    },
    { "Verified": C_GREEN, "Incorrect/Missing": C_RED, "No Response": C_BLACK }
  ));

  // Members Training (from RM)
  grid.appendChild(_recPiePanel(
    "MEMBERS TRAINING",
    _recPieData_Training(baseRM),
    "PIE_TRAIN",
    function(clickedLabel){
      return function(rm){
        return _recTrainingBucket(String(rm.CertificationValidation||"")) === clickedLabel;
      };
    },
    { "Certified": C_GREEN, "At-Risk": C_YELL, "Overdue": C_RED }
  ));

  // AFRIMS Access (from RM)
  grid.appendChild(_recPiePanel(
    "AFRIMS ACCESS",
    _recPieData_Afrims(baseRM),
    "PIE_AFRIMS",
    function(clickedLabel){
      return function(rm){
        return _recAccessBucket_Afrims(String(rm.AFRIMSAccess||"")) === clickedLabel;
      };
    },
    { "Granted Access": C_GREEN, "Under Review": C_YELL, "Not Granted": C_RED }
  ));

  // ERM Access (from RM)
  grid.appendChild(_recPiePanel(
    "ERM ACCESS",
    _recPieData_Erm(baseRM),
    "PIE_ERM",
    function(clickedLabel){
      return function(rm){
        return _recAccessBucket_Erm(String(rm.ERMAccess||"")) === clickedLabel;
      };
    },
    { "Granted": C_GREEN, "Under Review": C_YELL, "Not Granted": C_RED }
  ));

  b.appendChild(grid);
  p.appendChild(b);
  return p;
}

/* ===================== RECORDS CHART PANEL (grouped columns, click-to-filter) ===================== */ function _recPiePanel(title, data, key, makeFn, colorsByLabel){
  _recEnsureStateDefaults();
  var ui = STATE.recordsUI;

  var box = el("div","piePanel");
  box.style.border = "1px solid rgba(255,255,255,.15)";
  box.style.borderRadius = "14px";
  box.style.overflow = "hidden";
  box.style.background = "rgba(0,0,0,.05)";

  var hd = el("div","pieHead");
  hd.style.padding = "8px 10px";
  hd.style.background = "rgba(0,120,212,.9)";
  hd.style.color = "#fff";
  hd.style.fontWeight = "700";
  hd.style.fontSize = "12px";
  hd.style.letterSpacing = ".5px";
  hd.textContent = title;
  box.appendChild(hd);

  var body = el("div","pieBody");
  body.style.padding = "6px 10px 10px 10px";

  var activeLabel = (ui.pieFilter && ui.pieFilter.key === key) ? ui.pieFilter.value : null;

  // Map color-by-label onto each bar's {label,value,color} pair for renderBarChart
  var pairs = [];
  for(var i=0;i<(data||[]).length;i++){
    var it = data[i];
    var lbl = String(it.label || "");
    pairs.push({
      label: lbl,
      value: it.value || 0,
      color: (colorsByLabel && colorsByLabel[lbl]) ? colorsByLabel[lbl] : null
    });
  }

  renderBarChart(body, "", pairs, activeLabel, function(label){
    if(ui.pieFilter && ui.pieFilter.key === key && ui.pieFilter.value === label){
      ui.pieFilter = null;
      render();
      return;
    }
    ui.pieFilter = {
      key: key,
      value: label,
      fn: (typeof makeFn === "function" ? makeFn(label) : null)
    };
    render();
  });

  box.appendChild(body);
  return box;
}

/* ===================== CHART DATA BUILDERS ===================== */ function _recPieData_AppointmentLetters(riRows){
  var bad=0, ok=0, nr=0;
  for(var i=0;i<(riRows||[]).length;i++){
    var s = String(riRows[i].AppointmentLetter||"");
    var cls = _recClassRI_Appt(s);
    if(cls === "good") ok++;
    else if(cls === "warn") nr++;
    else bad++;
  }
  return [
    { label:"Verified", value:ok },
    { label:"Incorrect/Missing", value:bad },
    { label:"No Response", value:nr }
  ];
}
function _recPieData_Training(rmRows){
  var od=0, cert=0, risk=0;
  for(var i=0;i<(rmRows||[]).length;i++){
    var b = _recTrainingBucket(rmRows[i].CertificationValidation);
    if(b === "Certified") cert++;
    else if(b === "Overdue") od++;
    else risk++;
  }
  return [
    { label:"Certified", value:cert },
    { label:"At-Risk", value:risk },
    { label:"Overdue", value:od }
  ];
}
function _recPieData_Afrims(rmRows){
  var ur=0, ga=0, ng=0;
  for(var i=0;i<(rmRows||[]).length;i++){
    var b = _recAccessBucket_Afrims(rmRows[i].AFRIMSAccess);
    if(b === "Granted Access") ga++;
    else if(b === "Under Review") ur++;
    else ng++;
  }
  return [
    { label:"Granted Access", value:ga },
    { label:"Under Review", value:ur },
    { label:"Not Granted", value:ng }
  ];
}
function _recPieData_Erm(rmRows){
  var ur=0, g=0, ng=0;
  for(var i=0;i<(rmRows||[]).length;i++){
    var b = _recAccessBucket_Erm(rmRows[i].ERMAccess);
    if(b === "Granted") g++;
    else if(b === "Under Review") ur++;
    else ng++;
  }
  return [
    { label:"Granted", value:g },
    { label:"Under Review", value:ur },
    { label:"Not Granted", value:ng }
  ];
}

/* ===================== CENTER: BREAKDOWN GRID ===================== */ function _recRenderBreakdownCenter(centerRM){
  _recEnsureStateDefaults();
  var ui = STATE.recordsUI;
  var tstate = STATE.table.RECORDS;

  var p = el("div","panel");
  var h = el("div","panel-h");
  h.appendChild(el("div",null,"Breakdown"));
  p.appendChild(h);

  var b = el("div","panel-b");
  b.style.padding = "0";

  var table = el("table","tbl");
  var thead = el("thead");
  var trh = el("tr");

  var cols = [
    { key:"Unit", label:"UNIT" },
    { key:"InventoryBest", label:"INVENTORY" },
    { key:"Position", label:"ROLE" },
    { key:"Title", label:"NAME" },
    { key:"Phone", label:"PHONE" },
    { key:"ApptBucket", label:"APT LETTER" },
    { key:"TrainBucket", label:"TRAINING" },
    { key:"AfrimsBucket", label:"AFRIMS" },
    { key:"ErmBucket", label:"ERM" }
  ];

  function sortLabel(c){
    var s = c.label;
    if(tstate.sortKey === c.key) s += (tstate.sortDir === "asc" ? " ▲" : " ▼");
    return s;
  }

  function setSort(key){
    if(tstate.sortKey === key){
      tstate.sortDir = (tstate.sortDir === "asc" ? "desc" : "asc");
    } else {
      tstate.sortKey = key;
      tstate.sortDir = "asc";
    }
    render();
  }

  for(var ci=0;ci<cols.length;ci++){
    (function(col){
      var th = el("th",null,sortLabel(col));
      on(th,"click",function(){ setSort(col.key); });
      trh.appendChild(th);
    })(cols[ci]);
  }

  thead.appendChild(trh);
  table.appendChild(thead);

  var tbody = el("tbody");

  var rows = (centerRM||[]).slice(0);
  for(var i=0;i<rows.length;i++){
    rows[i]._InventoryBest = _recBestInventoryText(rows[i].PrimaryInventory, rows[i].AdditionalInventories);
    rows[i]._ApptBucket = _recApptLabelForRM(rows[i]);
    rows[i]._TrainBucket = _recTrainingBucket(String(rows[i].CertificationValidation||""));
    rows[i]._AfrimsBucket = _recAccessBucket_Afrims(String(rows[i].AFRIMSAccess||""));
    rows[i]._ErmBucket = _recAccessBucket_Erm(String(rows[i].ERMAccess||""));
  }

  function sval(r, key){
    if(key === "InventoryBest") return String(r._InventoryBest||"");
    if(key === "ApptBucket") return String(r._ApptBucket||"");
    if(key === "TrainBucket") return String(r._TrainBucket||"");
    if(key === "AfrimsBucket") return String(r._AfrimsBucket||"");
    if(key === "ErmBucket") return String(r._ErmBucket||"");
    return String(r[key] || "");
  }

  rows.sort(function(a,bx){
    var ka = sval(a, tstate.sortKey).toLowerCase();
    var kb = sval(bx, tstate.sortKey).toLowerCase();
    if(ka < kb) return (tstate.sortDir === "asc" ? -1 : 1);
    if(ka > kb) return (tstate.sortDir === "asc" ? 1 : -1);

    var ua = String(a.Unit||"").toLowerCase();
    var ub = String(bx.Unit||"").toLowerCase();
    if(ua < ub) return -1;
    if(ua > ub) return 1;
    var na = String(a.Title||"").toLowerCase();
    var nb = String(bx.Title||"").toLowerCase();
    if(na < nb) return -1;
    if(na > nb) return 1;
    return 0;
  });

  for(i=0;i<rows.length;i++){
    (function(r){
      var tr = el("tr");
      if(String(ui.selectedRMId) === String(r.Id)) tr.classList.add("rowSel");
      on(tr,"click",function(){
        ui.selectedRMId = r.Id;
        render();
      });

      tr.appendChild(tdTxt(r.Unit || ""));
      tr.appendChild(tdTxt(r._InventoryBest || ""));
      tr.appendChild(tdTxt(r.Position || ""));
      tr.appendChild(tdTxt(r.Title || ""));
      tr.appendChild(tdTxt(r.Phone || ""));

      tr.appendChild(tdHtml(_recBadgeHtml(r._ApptBucket, _recClassRM_Appt(String(r.AppointmentLetterValidation||"")))));
      tr.appendChild(tdHtml(_recBadgeHtml(r._TrainBucket, _recClassRM_Cert(String(r.CertificationValidation||"")))));
      tr.appendChild(tdHtml(_recBadgeHtml(r._AfrimsBucket, _recClassRM_Afrims(String(r.AFRIMSAccess||"")))));
      tr.appendChild(tdHtml(_recBadgeHtml(r._ErmBucket, _recClassRM_Erm(String(r.ERMAccess||"")))));

      tbody.appendChild(tr);
    })(rows[i]);
  }

  table.appendChild(tbody);
  b.appendChild(table);

  var hint = el("div","footnote");
  hint.style.padding = "8px 10px";
  hint.textContent = (ui.pieFilter ? ("Pie Filter: " + ui.pieFilter.value) : "Pie Filter: (none)");
  b.appendChild(hint);

  p.appendChild(b);
  return p;
}

function _recBestInventoryText(primary, additional){
  var p = String(primary||"").trim();
  if(p) return p;
  var a = String(additional||"").trim();
  if(!a) return "";
  var first = a.split(/[;,]/)[0];
  return first ? first.trim() : a;
}
function _recApptLabelForRM(rm){
  var v = String(rm.AppointmentLetterValidation||"").trim();
  if(!v) return "(Blank)";
  return v;
}

/* ===================== BADGE + CLASSIFICATION HELPERS ===================== */ 
function _recBadgeHtml(text, cls){
  var c = "badge ";
  if(cls === "good") c += "good";
  else if(cls === "warn") c += "warn";
  else c += "bad";

  var t = (text===null||text===undefined||String(text).trim()==="") ? "(Blank)" : String(text);
  return '<span class="'+c+'">' + esc(t) + '</span>'; }

function _recClassRM_Appt(v){
  v = String(v||"").toLowerCase();
  if(v === "verified") return "good";
  if(v.indexOf("needs") > -1) return "warn";
  if(v === "incorrect") return "bad";
  if(!v) return "bad";
  return "bad";
}
function _recClassRM_Afrims(v){
  v = String(v||"").toLowerCase();
  if(v === "yes" || v.indexOf("grant") > -1) return "good";
  if(v.indexOf("under") > -1 || v.indexOf("review") > -1 || v.indexOf("needs") > -1 || v.indexOf("pending") > -1) return "warn";
  if(!v) return "bad";
  return "bad";
}
function _recClassRM_Erm(v){
  v = String(v||"").toLowerCase();
  if(v === "granted" || v.indexOf("grant") > -1) return "good";
  if(v.indexOf("under") > -1 || v.indexOf("review") > -1 || v.indexOf("needs") > -1 || v.indexOf("pending") > -1) return "warn";
  if(!v) return "bad";
  if(v.indexOf("not") > -1) return "bad";
  return "bad";
}
function _recClassRM_Cert(v){
  v = String(v||"").toLowerCase();
  if(v === "validated") return "good";
  if(v.indexOf("days out") > -1) return "warn";
  if(v === "overdue") return "bad";
  if(!v) return "bad";
  if(v.indexOf("day") > -1) return "warn";
  return "bad";
}
function _recClassRI_Appt(v){
  v = String(v||"").toLowerCase();
  if(v === "yes") return "good";
  if(v.indexOf("needs follow") > -1) return "warn";
  if(v === "incorrect" || v === "missing") return "bad";
  if(!v) return "bad";
  return "bad";
}
/* ---------- Risk grouping ---------- */ function _recRiskGroup(riskText){
  var t = String(riskText||"").toLowerCase();
  if(!t || t === "all validated") return "All Validated";

  var hasAppt = (t.indexOf("appointment letter") > -1);
  var hasCert = (t.indexOf("certification") > -1);
  var hasAfr  = (t.indexOf("afrims") > -1);
  var hasErm  = (t.indexOf("erm") > -1);

  var n = 0;
  if(hasAppt) n++;
  if(hasCert) n++;
  if(hasAfr)  n++;
  if(hasErm)  n++;

  if(n >= 2) return "Multiple";
  if(hasAppt) return "Appointment Letter";
  if(hasCert) return "Certification";
  if(hasAfr)  return "AFRIMS";
  if(hasErm)  return "ERM";
  return "Multiple";
}

function _recCertBucket(v){
  v = String(v||"").toLowerCase();
  if(v === "validated") return "Validated";
  if(v === "overdue") return "Overdue";
  if(v.indexOf("day") > -1) return "Days Out";
  if(v.indexOf("days out") > -1) return "Days Out";
  return "Overdue";
}

/* ===================== REQUIRED BUCKET HELPERS ===================== */ function _recTrainingBucket(v){
  var t = String(v || "").toLowerCase().trim();

  if(t === "validated" || t === "certified" || t === "complete" || t === "completed") return "Certified";
  if(t === "overdue" || t.indexOf("overdue") > -1 || t.indexOf("past due") > -1) return "Overdue";
  if(t.indexOf("days out") > -1 || t.indexOf("day") > -1 || t.indexOf("due soon") > -1 || t.indexOf("at risk") > -1) return "At-Risk";

  if(!t) return "Overdue";
  return "At-Risk";
}

function _recAccessBucket_Afrims(v){
  var t = String(v || "").toLowerCase().trim();

  if(t === "yes" || t === "y" || t.indexOf("grant") > -1) return "Granted Access";
  if(t.indexOf("under") > -1 || t.indexOf("review") > -1 || t.indexOf("needs") > -1 || t.indexOf("pending") > -1) return "Under Review";
  if(t === "no" || t === "n" || t.indexOf("not") > -1 || t.indexOf("deny") > -1) return "Not Granted";

  if(!t) return "Not Granted";
  return "Under Review";
}

function _recAccessBucket_Erm(v){
  var t = String(v || "").toLowerCase().trim();

  if(t === "yes" || t === "y" || t === "granted" || t.indexOf("grant") > -1) return "Granted";
  if(t.indexOf("under") > -1 || t.indexOf("review") > -1 || t.indexOf("needs") > -1 || t.indexOf("pending") > -1) return "Under Review";
  if(t === "no" || t === "n" || t.indexOf("not") > -1 || t.indexOf("deny") > -1) return "Not Granted";

  if(!t) return "Not Granted";
  return "Under Review";
}

/* ===================== LEFT SIDE UI (SELF-CONTAINED + SAFE) ===================== */ function _recRenderFilters(rawAll, filteredAll){
  _recEnsureStateDefaults();
  var f = STATE.filters.RECORDS;

  var p = el("div","panel");
  var h = el("div","panel-h");
  h.appendChild(el("div",null,"Filters (Records)"));

  var clear = el("button","btn btn-ghost","Clear");
  clear.style.padding="6px 10px";
  on(clear,"click",function(){
    STATE.filters.RECORDS = {
      search:"", unit:[], position:[], apptRM:[], cert:[], afrims:[], erm:[],
      riskGroup:[], showAllRisks:false, riskRaw:[], chartFilter:null
    };
    STATE.recordsUI.pieFilter = null;
    render();
  });
  h.appendChild(clear);

  p.appendChild(h);

  var b = el("div","panel-b");
  var grid = el("div","filterGrid");

  // Search
  var r1 = el("div","frow");
  r1.appendChild(el("label",null,"Search"));
  var inp = el("input");
  inp.type = "text";
  inp.id = "recSearch";
  inp.placeholder = "Name, unit, inventory, risk text.";
  inp.value = f.search;
  on(inp,"input",function(){
    f.search = inp.value;
    render();
  });
  r1.appendChild(inp);
  grid.appendChild(r1);

  // Unit chips
  var units = uniqSorted(rawAll.filter(function(x){return x._type==="RM";}).map(function(x){return x.Unit;}));
  grid.appendChild(_recChipMulti("Unit", units, f.unit, function(v){
    toggleArr(f.unit, v); render();
  }));

  // Role chips
  var roles = uniqSorted(rawAll.filter(function(x){return x._type==="RM";}).map(function(x){return x.Position;}));
  grid.appendChild(_recChipMulti("Role", roles, f.position, function(v){
    toggleArr(f.position, v); render();
  }));

  // Risk group chips
  var rgs = uniqSorted(rawAll.filter(function(x){return x._type==="RM";}).map(function(x){return _recRiskGroup(x.Risk);}));
  grid.appendChild(_recChipMulti("Risk Group", rgs, f.riskGroup, function(v){
    toggleArr(f.riskGroup, v); render();
  }));

  b.appendChild(grid);
  b.appendChild(el("div","muted","Showing "+(filteredAll||[]).length+" of "+(rawAll||[]).length));
  p.appendChild(b);
  return p;
}

function _recChipMulti(label, values, selectedArr, onToggle){
  var r = el("div","frow");
  r.appendChild(el("label",null,label));
  var box = el("div","chipbox");

  values = (values||[]).filter(function(v){ return v !== null && v !== undefined && String(v).trim() !== ""; });

  if(!values.length){
    box.appendChild(el("div","muted","No values"));
  } else {
    for(var i=0;i<values.length;i++){
      var v = values[i];
      var c = el("div","chip",v);
      if(selectedArr.indexOf(v)>-1) c.classList.add("on");
      (function(val, chip){
        on(chip,"click",function(){ onToggle(val); });
      })(v,c);
      box.appendChild(c);
    }
  }
  r.appendChild(box);
  return r;
}

function _recRenderExecTiles(rawAll, filteredAll){
  _recEnsureStateDefaults();

  var p = el("div","panel");
  var h = el("div","panel-h");
  h.appendChild(el("div",null,"Records KPIs"));
  p.appendChild(h);

  var b = el("div","panel-b");

  var rmAll = rawAll.filter(function(r){ return r._type==="RM"; });
  var rmShown = filteredAll.filter(function(r){ return r._type==="RM"; });

  var riskCount = 0;
  for(var i=0;i<rmShown.length;i++){
    if(_recRiskGroup(rmShown[i].Risk||"") !== "All Validated") riskCount++;
  }

  var row = el("div","kpiRow");
  row.appendChild(kpi("Record Managers", rmShown.length, "Total RM: "+rmAll.length));
  row.appendChild(kpi("Open Issues", riskCount, "In current filter"));
  row.appendChild(kpi("Pie Filter", (STATE.recordsUI.pieFilter ? "On" : "Off"), (STATE.recordsUI.pieFilter ? STATE.recordsUI.pieFilter.value : "None")));
  b.appendChild(row);

  p.appendChild(b);
  return p;
}
